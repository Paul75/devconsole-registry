# PHP build configuration for DevConsole
# Uses static-php-cli (https://static-php.dev)
#
# Usage:
#   curl -fsSL -o spc https://dl.static-php.dev/v3/spc-bin/nightly/spc-linux-x86_64
#   chmod +x spc
#   ./spc craft craft.yml
#
# Requires: autoconf, automake, libtool, cmake, make, gcc, g++, pkg-config,
#           re2c, bison, libxml2-dev, libsqlite3-dev, libcurl4-openssl-dev,
#           libreadline-dev, libzip-dev, libonig-dev, libssl-dev

php-version: "8.4"
extensions: >
  bcmath,ctype,curl,dom,exif,fileinfo,filter,gd,iconv,mbstring,mysqli,
  mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,
  readline,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,
  xmlwriter,xmlreader,xsl,zip,zlib
sapi:
  - cli
  - fpm
  - cgi
download-options:
  parallel: 10
craft-options:
  clean: true
